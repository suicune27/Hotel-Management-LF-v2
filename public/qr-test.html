<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room 101 QR Code Test</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f5f5f7;
}
.card {
  background: white;
  border-radius: 24px;
  padding: 40px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  text-align: center;
  max-width: 400px;
}
h1 { font-size: 20px; font-weight: 700; color: #1d1d1f; margin-bottom: 4px; }
.sub { font-size: 13px; color: #86868b; margin-bottom: 24px; }
#qrcode { display: inline-block; padding: 16px; background: white; border-radius: 16px; border: 2px solid #e5e5ea; margin-bottom: 20px; }
#qrcode img, #qrcode canvas { display: block; margin: 0 auto; }
.url { font-size: 11px; color: #86868b; font-family: monospace; word-break: break-all; background: #f5f5f7; padding: 8px 12px; border-radius: 8px; }
input { width: 100%; padding: 10px 14px; border: 1.5px solid #e5e5ea; border-radius: 12px; font-size: 14px; margin-bottom: 16px; outline: none; }
input:focus { border-color: #007aff; }
.room-badge {
  display: inline-block;
  background: #007aff;
  color: white;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 20px;
  margin-bottom: 16px;
}
</style>
</head>
<body>
<div class="card">
  <div class="room-badge">Suite #101</div>
  <h1>Scan to Access Room Portal</h1>
  <p class="sub">Open on the same WiFi network</p>
  <div id="qrcode"></div>
  <p class="url" id="urlDisplay">Loading...</p>
  <div style="margin-top: 20px;">
    <label style="font-size: 12px; color: #86868b; display: block; margin-bottom: 6px;">Server URL (detected automatically)</label>
    <input id="serverUrl" type="text" value="Loading..." />
  </div>
</div>
<script>
const serverInput = document.getElementById('serverUrl');
const urlDisplay = document.getElementById('urlDisplay');
let qr = null;

// Auto-detect server hostname so QR works from any device on the network
const detectedBase = window.location.protocol + '//' + window.location.hostname + ':' + window.location.port;

function generateQR(url) {
  document.getElementById('qrcode').innerHTML = '';
  qr = new QRCode(document.getElementById('qrcode'), {
    text: url,
    width: 220,
    height: 220,
    colorDark: '#1d1d1f',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
  urlDisplay.textContent = url;
}

serverInput.value = detectedBase;
generateQR(detectedBase + '/guest-access?room=101');

serverInput.addEventListener('input', () => {
  const base = serverInput.value.replace(/\/+$/, '');
  const url = base + '/guest-access?room=101';
  generateQR(url);
});
</script>
</body>
</html>
